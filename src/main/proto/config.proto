syntax = "proto3";

option java_multiple_files = true;
option java_package = "org.project.grpc";
option java_outer_classname = "DataServiceProto";

import "google/protobuf/empty.proto";

enum InstrumentIdType {
  INSTRUMENT_ID_UNSPECIFIED = 0;
  INSTRUMENT_ID_TYPE_FIGI = 1;
  INSTRUMENT_ID_TYPE_TICKER = 2;
  INSTRUMENT_ID_TYPE_UID = 3;
  INSTRUMENT_ID_TYPE_POSITION_UID = 4;
  INSTRUMENT_ID_TYPE_ID = 5;
}

message Currency {
  string figi = 1;
  string ticker = 2;
  string class_code = 3;
  string isin = 4;
  int32  lot = 5;
  string currency = 6;  // валюта расчётов ("rub", "usd")
  string name = 7;
  string exchange = 8;
  string country_of_risk = 9;
  string iso_currency_name = 10; // ISO-код ("RUB", "USD")
  string uid = 11;
  string position_uid = 12;
  bool   buy_available = 13;
  bool   sell_available = 14;
  bool   api_trade_available = 15;
  bool   for_iis = 16;
  bool   weekend_flag = 17;
}


service InstrumentDataFetcher {
  rpc getCurrencyById(GetCurrencyByIdRequest) returns (GetCurrencyByIdResponse);
}



message GetCurrencyByIdRequest {
  InstrumentIdType idType = 1;
  string classCode = 2;
  string id = 3;
}

message GetCurrencyByIdResponse {
  Currency currency = 1;
}